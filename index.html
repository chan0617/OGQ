<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OGQ 스티커 분할기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;
  background:#0d0d14;color:#dde0f0;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:32px 16px 60px;
}
h1{
  font-size:1.5rem;font-weight:700;margin-bottom:4px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{font-size:.8rem;color:#555;margin-bottom:24px}

/* 업로드 */
#drop-zone{
  width:100%;max-width:860px;
  border:2px dashed #2a2a42;border-radius:14px;
  padding:44px 24px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
#drop-zone:hover,#drop-zone.over{border-color:#a78bfa;background:rgba(167,139,250,.05)}
#drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#drop-zone .ico{font-size:2rem;margin-bottom:10px}
#drop-zone p{font-size:.88rem;color:#888}
#drop-zone strong{color:#c4b5fd}

/* 안내 배너 */
#guide-bar{
  width:100%;max-width:860px;
  margin-top:14px;padding:12px 18px;
  background:#191926;border-radius:10px;border-left:3px solid #7c3aed;
  font-size:.82rem;color:#aaa;line-height:1.6;display:none;
}
#guide-bar b{color:#c4b5fd}
#guide-bar .step-dots{display:flex;gap:6px;margin-top:8px}
.dot{
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;border:2px solid #2e2e4a;color:#555;
}
.dot.done{background:#7c3aed;border-color:#7c3aed;color:#fff}
.dot.active{border-color:#a78bfa;color:#a78bfa}

/* 캔버스 */
#canvas-wrap{
  width:100%;max-width:860px;
  margin-top:14px;display:none;position:relative;
}
#main-canvas{
  display:block;width:100%;border-radius:10px;
  border:1px solid #1e1e30;
}

/* 좌표 표시 */
#coord-info{
  width:100%;max-width:860px;margin-top:10px;
  display:none;
  background:#141420;border-radius:10px;padding:12px 16px;
  font-size:.75rem;font-family:monospace;color:#666;line-height:1.8;
}
#coord-info .row{display:flex;gap:24px;flex-wrap:wrap}
.ci{color:#a78bfa}
.ci span{color:#e0e4f0}

/* 버튼들 */
.btn-row{
  width:100%;max-width:860px;margin-top:16px;
  display:none;gap:10px;flex-wrap:wrap;
}
button.sec{
  padding:9px 20px;font-size:.82rem;font-weight:600;
  border:1px solid #2e2e4a;border-radius:9px;
  background:transparent;color:#888;cursor:pointer;transition:all .2s;
}
button.sec:hover{border-color:#7c3aed;color:#a78bfa}
button.pri{
  padding:11px 36px;font-size:.9rem;font-weight:700;
  border:none;border-radius:10px;
  background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;
  cursor:pointer;transition:opacity .2s,transform .1s;flex:1;
}
button.pri:hover{opacity:.88;transform:translateY(-1px)}
button.pri:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* 진행 */
#prog-wrap{width:100%;max-width:860px;margin-top:14px;display:none}
#prog-bg{height:5px;background:#1e1e2e;border-radius:99px;overflow:hidden}
#prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .1s}
#prog-lbl{font-size:.72rem;color:#555;margin-top:4px;text-align:right}

/* 결과 */
#result-sec{width:100%;max-width:860px;margin-top:28px;display:none}
#result-sec h2{font-size:.92rem;font-weight:600;color:#c4b5fd;margin-bottom:12px}
#sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.s-item{
  position:relative;aspect-ratio:740/640;
  background:repeating-conic-gradient(#1a1a26 0% 25%,#202030 0% 50%) 0 0/10px 10px;
  border-radius:4px;overflow:hidden;cursor:pointer;
}
.s-item img{width:100%;height:100%;object-fit:cover;display:block}
.s-item .n{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.4)}

#dl-btn{
  margin-top:12px;width:100%;padding:12px;
  font-size:.88rem;font-weight:600;border:none;border-radius:10px;
  background:linear-gradient(135deg,#059669,#0891b2);color:#fff;
  cursor:pointer;transition:opacity .2s;
}
#dl-btn:hover{opacity:.88}
#dl-btn:disabled{opacity:.35;cursor:not-allowed}

/* 로그 */
#log{
  width:100%;max-width:860px;margin-top:12px;
  background:#080810;border-radius:9px;padding:12px 14px;
  font-size:.72rem;color:#555;font-family:monospace;
  line-height:1.8;display:none;max-height:220px;overflow-y:auto;white-space:pre;
}
.ok{color:#34d399}.er{color:#f87171}.inf{color:#60a5fa}.wn{color:#fbbf24}
</style>
</head>
<body>

<h1>OGQ 스티커 분할기</h1>
<p class="sub">4개 꼭짓점 직접 지정 → 원본 픽셀 기준 crop → 24개 분할</p>

<div id="drop-zone">
  <input type="file" id="file-in" accept="image/*"/>
  <div class="ico">🖼️</div>
  <p><strong>PNG 파일을 드래그</strong>하거나 클릭해서 선택</p>
  <p style="margin-top:6px;font-size:.72rem;color:#444">4800×3584px · 6열 × 4행 · 24개 스티커</p>
</div>

<!-- 안내 -->
<div id="guide-bar">
  <b id="guide-text">이미지에서 스티커 영역의 꼭짓점 4개를 순서대로 클릭하세요.</b>
  <div class="step-dots">
    <div class="dot active" id="d1">1</div>
    <div class="dot" id="d2">2</div>
    <div class="dot" id="d3">3</div>
    <div class="dot" id="d4">4</div>
  </div>
  <div style="margin-top:8px;font-size:.72rem;color:#555">
    ① 좌상단 → ② 우상단 → ③ 우하단 → ④ 좌하단 순서 (순서 무관, 4점을 찍으면 자동 인식)
  </div>
</div>

<!-- 캔버스 -->
<div id="canvas-wrap"><canvas id="main-canvas"></canvas></div>

<!-- 좌표 -->
<div id="coord-info">
  <div class="row">
    <span class="ci">원본 크기: <span id="ci-orig">—</span></span>
    <span class="ci">선택 영역: <span id="ci-box">—</span></span>
    <span class="ci">셀 크기: <span id="ci-cell">—</span></span>
  </div>
</div>

<!-- 버튼 -->
<div class="btn-row" id="btn-row" style="display:none;display:flex">
  <button class="sec" id="reset-pts">↺ 점 초기화</button>
  <button class="pri" id="run-btn" disabled>✂️ 분할 시작</button>
</div>

<div id="prog-wrap">
  <div id="prog-bg"><div id="prog-bar"></div></div>
  <div id="prog-lbl">0 / 24</div>
</div>

<div id="result-sec">
  <h2>분할 결과 — 클릭하면 개별 다운로드</h2>
  <div id="sticker-grid"></div>
  <button id="dl-btn">⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)</button>
</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(()=>{
'use strict';

// ── 상수 ──────────────────────────────────────────────────
const COLS=6, ROWS=4, OUT_W=4440, OUT_H=2560, CELL_W=740, CELL_H=640, TOTAL=24;
const PT_R = 8;  // 핸들 반지름 (캔버스 내부 px)
const PT_LABELS = ['① 좌상단','② 우상단','③ 우하단','④ 좌하단'];
const COLORS = ['#f87171','#34d399','#60a5fa','#fbbf24'];

// ── 상태 ──────────────────────────────────────────────────
let origImg   = null;
let srcCvs    = null;   // 원본 해상도 오프스크린 캔버스
let dispScale = 1;      // canvas.width / img.naturalWidth  (내부 해상도 배율)
// pts: 원본 이미지 픽셀 좌표 [{x,y}, ...]  최대 4개
let pts = [];
let dragging = null;    // 드래그 중인 점 인덱스
let resultBlobs = [];

// ── DOM ──────────────────────────────────────────────────
const dropZone   = document.getElementById('drop-zone');
const fileIn     = document.getElementById('file-in');
const guideBar   = document.getElementById('guide-bar');
const guideText  = document.getElementById('guide-text');
const canvasWrap = document.getElementById('canvas-wrap');
const cvs        = document.getElementById('main-canvas');
const ctx        = cvs.getContext('2d');
const coordInfo  = document.getElementById('coord-info');
const ciOrig     = document.getElementById('ci-orig');
const ciBox      = document.getElementById('ci-box');
const ciCell     = document.getElementById('ci-cell');
const btnRow     = document.getElementById('btn-row');
const resetPts   = document.getElementById('reset-pts');
const runBtn     = document.getElementById('run-btn');
const progWrap   = document.getElementById('prog-wrap');
const progBar    = document.getElementById('prog-bar');
const progLbl    = document.getElementById('prog-lbl');
const resultSec  = document.getElementById('result-sec');
const stickerGrid= document.getElementById('sticker-grid');
const dlBtn      = document.getElementById('dl-btn');
const logEl      = document.getElementById('log');

// ── 파일 로드 ─────────────────────────────────────────────
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{e.preventDefault();dropZone.classList.remove('over');loadFile(e.dataTransfer.files[0])});
fileIn.addEventListener('change', ()=>{if(fileIn.files[0])loadFile(fileIn.files[0])});

function loadFile(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    const img = new Image();
    img.onload = ()=>{
      origImg = img;

      // 원본 해상도 오프스크린 캔버스 (저장용)
      srcCvs = document.createElement('canvas');
      srcCvs.width  = img.naturalWidth;
      srcCvs.height = img.naturalHeight;
      srcCvs.getContext('2d').drawImage(img, 0, 0);

      initCanvas();
      resetAll();

      canvasWrap.style.display = 'block';
      guideBar.style.display   = 'block';
      coordInfo.style.display  = 'block';
      btnRow.style.display     = 'flex';
      resultSec.style.display  = 'none';
      logEl.style.display      = 'none';
      logEl.innerHTML          = '';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── 캔버스 초기화 ─────────────────────────────────────────
// canvas.width = img.naturalWidth * dispScale  → 내부 해상도
// CSS width:100% 로 화면에 맞춰 표시
function initCanvas(){
  const maxW = Math.min(860, window.innerWidth - 32);
  dispScale  = maxW / origImg.naturalWidth;
  cvs.width  = Math.round(origImg.naturalWidth  * dispScale);
  cvs.height = Math.round(origImg.naturalHeight * dispScale);
  ciOrig.textContent = `${origImg.naturalWidth} × ${origImg.naturalHeight} px`;
}

window.addEventListener('resize', ()=>{ if(origImg){ initCanvas(); render(); }});

// ── 좌표 변환 ─────────────────────────────────────────────
// 마우스 이벤트 clientX/Y  →  캔버스 내부 px  →  원본 이미지 px
function getOrigCoord(e){
  const rect = cvs.getBoundingClientRect();
  // CSS 표시 크기 대비 캔버스 내부 해상도 보정
  const cssToCanvasX = cvs.width  / rect.width;
  const cssToCanvasY = cvs.height / rect.height;
  const canvasX = (e.clientX - rect.left) * cssToCanvasX;
  const canvasY = (e.clientY - rect.top)  * cssToCanvasY;
  // 캔버스 내부 px → 원본 이미지 px
  const origX = canvasX / dispScale;
  const origY = canvasY / dispScale;
  return {
    ox: clamp(origX, 0, origImg.naturalWidth),
    oy: clamp(origY, 0, origImg.naturalHeight),
    cx: canvasX,
    cy: canvasY
  };
}

// 원본 이미지 px → 캔버스 내부 px
function toCanvas(ox, oy){ return { cx: ox * dispScale, cy: oy * dispScale }; }

// ── 점 리셋 ──────────────────────────────────────────────
function resetAll(){
  pts = [];
  resultBlobs = [];
  stickerGrid.innerHTML = '';
  runBtn.disabled = true;
  updateDots();
  updateGuide();
  render();
}
resetPts.addEventListener('click', resetAll);

// ── 클릭으로 점 추가 ──────────────────────────────────────
cvs.addEventListener('mousedown', e=>{
  const {ox, oy, cx, cy} = getOrigCoord(e);

  // 기존 점 드래그 시작?
  for(let i=0;i<pts.length;i++){
    const {cx:px, cy:py} = toCanvas(pts[i].x, pts[i].y);
    if(Math.hypot(cx-px, cy-py) <= PT_R + 4){
      dragging = i;
      cvs.style.cursor = 'grabbing';
      return;
    }
  }

  // 4점 미만이면 새 점 추가
  if(pts.length < 4){
    pts.push({ x: ox, y: oy });
    updateDots();
    updateGuide();
    if(pts.length === 4){
      runBtn.disabled = false;
    }
    render();
  }
});

cvs.addEventListener('mousemove', e=>{
  const {ox, oy, cx, cy} = getOrigCoord(e);

  if(dragging !== null){
    pts[dragging] = { x: ox, y: oy };
    updateCoordDisplay();
    render();
    return;
  }

  // 커서
  let overPt = false;
  for(let i=0;i<pts.length;i++){
    const {cx:px,cy:py} = toCanvas(pts[i].x, pts[i].y);
    if(Math.hypot(cx-px, cy-py) <= PT_R+4){ overPt=true; break; }
  }
  cvs.style.cursor = overPt ? 'grab' : (pts.length<4 ? 'crosshair' : 'default');
});

window.addEventListener('mouseup', ()=>{
  if(dragging !== null){ dragging=null; cvs.style.cursor='default'; updateCoordDisplay(); }
});

// ── 안내 텍스트 / 점 도트 ────────────────────────────────
const stepDots = [1,2,3,4].map(i=>document.getElementById('d'+i));

function updateDots(){
  stepDots.forEach((d,i)=>{
    d.className = 'dot';
    if(i < pts.length)       d.classList.add('done');
    else if(i === pts.length) d.classList.add('active');
  });
}

const GUIDE_MSGS = [
  '① <b>좌상단</b> 꼭짓점을 클릭하세요.',
  '② <b>우상단</b> 꼭짓점을 클릭하세요.',
  '③ <b>우하단</b> 꼭짓점을 클릭하세요.',
  '④ <b>좌하단</b> 꼭짓점을 클릭하세요.',
  '4개 점이 지정되었습니다. 점을 드래그해서 조정하거나 <b>분할 시작</b>을 누르세요.',
];
function updateGuide(){
  guideText.innerHTML = GUIDE_MSGS[Math.min(pts.length, 4)];
}

// ── 좌표 정보 업데이트 ────────────────────────────────────
function updateCoordDisplay(){
  if(pts.length < 2){ ciBox.textContent='—'; ciCell.textContent='—'; return; }
  const b = getBounds();
  ciBox.textContent  = `x=${Math.round(b.x)} y=${Math.round(b.y)} w=${Math.round(b.w)} h=${Math.round(b.h)}`;
  ciCell.textContent = `${Math.round(b.w/COLS)} × ${Math.round(b.h/ROWS)} px`;
}

// ── bounding box ─────────────────────────────────────────
function getBounds(){
  const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  return {x, y, w, h};
}

// ── 렌더링 ────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.drawImage(origImg, 0, 0, cvs.width, cvs.height);

  if(pts.length >= 2){
    const b = getBounds();
    const bx = b.x*dispScale, by = b.y*dispScale;
    const bw = b.w*dispScale, bh = b.h*dispScale;

    // 바깥 어둡게
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,cvs.width,by);
    ctx.fillRect(0,by,bx,bh);
    ctx.fillRect(bx+bw,by,cvs.width-bx-bw,bh);
    ctx.fillRect(0,by+bh,cvs.width,cvs.height-by-bh);

    // 테두리
    ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;ctx.setLineDash([]);
    ctx.strokeRect(bx,by,bw,bh);

    // 6×4 격자
    ctx.strokeStyle='rgba(167,139,250,0.45)';ctx.lineWidth=1;ctx.setLineDash([4,3]);
    for(let c=1;c<COLS;c++){
      const x=bx+c*(bw/COLS);
      ctx.beginPath();ctx.moveTo(x,by);ctx.lineTo(x,by+bh);ctx.stroke();
    }
    for(let r=1;r<ROWS;r++){
      const y=by+r*(bh/ROWS);
      ctx.beginPath();ctx.moveTo(bx,y);ctx.lineTo(bx+bw,y);ctx.stroke();
    }
    ctx.setLineDash([]);
    updateCoordDisplay();
  }

  // 4개 점 표시
  pts.forEach((p,i)=>{
    const {cx,cy} = toCanvas(p.x, p.y);
    ctx.beginPath();
    ctx.arc(cx, cy, PT_R, 0, Math.PI*2);
    ctx.fillStyle   = COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth   = 2;
    ctx.stroke();

    // 라벨
    ctx.font = `bold ${Math.round(12*Math.min(1,dispScale*2))}px sans-serif`;
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    const lx = cx + PT_R + 4, ly = cy - PT_R - 4;
    ctx.fillText(PT_LABELS[i], lx, ly);

    // 좌표 (원본 픽셀)
    ctx.font = `${Math.round(10*Math.min(1,dispScale*2))}px monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(`(${Math.round(p.x)}, ${Math.round(p.y)})`, lx, ly+14);
  });
}

// ── 분할 실행 ────────────────────────────────────────────
runBtn.addEventListener('click', splitStickers);

async function splitStickers(){
  if(pts.length < 4){ alert('꼭짓점 4개를 모두 지정해주세요.'); return; }

  const b = getBounds();
  const bx = Math.round(b.x), by = Math.round(b.y);
  const bw = Math.round(b.w), bh = Math.round(b.h);

  logEl.style.display='block'; logEl.innerHTML='';
  addLog('inf',`▶ 분할 시작`);
  addLog('inf',`  원본: ${origImg.naturalWidth} × ${origImg.naturalHeight} px`);
  addLog('inf',`  4개 점: ${pts.map(p=>`(${Math.round(p.x)},${Math.round(p.y)})`).join(' / ')}`);
  addLog('inf',`  bounding box: x=${bx} y=${by} w=${bw} h=${bh}`);
  addLog('inf',`  → 리사이즈 ${OUT_W}×${OUT_H} → 셀 ${CELL_W}×${CELL_H}\n`);

  runBtn.disabled=true;
  progWrap.style.display='block';
  progBar.style.width='0%';
  resultSec.style.display='block';
  stickerGrid.innerHTML='';
  resultBlobs=[];

  // Step 1: 원본 이미지에서 bounding box 영역 crop (srcCvs 사용 - 원본 해상도)
  const cropCvs = document.createElement('canvas');
  cropCvs.width=bw; cropCvs.height=bh;
  const cropCtx = cropCvs.getContext('2d');
  cropCtx.drawImage(srcCvs, bx, by, bw, bh, 0, 0, bw, bh);
  addLog('inf',`  [1] 원본에서 crop: ${bw}×${bh} px`);

  // Step 2: 4440×2560으로 고품질 리사이즈
  const outCvs = document.createElement('canvas');
  outCvs.width=OUT_W; outCvs.height=OUT_H;
  const outCtx = outCvs.getContext('2d');
  outCtx.imageSmoothingEnabled=true;
  outCtx.imageSmoothingQuality='high';
  outCtx.drawImage(cropCvs, 0, 0, OUT_W, OUT_H);
  addLog('inf',`  [2] 리사이즈: ${OUT_W}×${OUT_H} px\n`);

  // Step 3: 740×640 분할
  for(let i=0;i<TOTAL;i++){
    const row=Math.floor(i/COLS), col=i%COLS;
    const sx=col*CELL_W, sy=row*CELL_H;

    const cell=document.createElement('canvas');
    cell.width=CELL_W; cell.height=CELL_H;
    cell.getContext('2d').drawImage(outCvs, sx, sy, CELL_W, CELL_H, 0, 0, CELL_W, CELL_H);

    const w=cell.width, h=cell.height;
    const ok=w===CELL_W&&h===CELL_H;
    const fname=`sticker_${String(i+1).padStart(2,'0')}.png`;
    addLog(ok?'ok':'er',`  ${fname}  ${w} × ${h} px  [${ok?'OK':'ERROR'}]`);

    const blob=await toBlob(cell);
    const dataUrl=cell.toDataURL('image/png');
    resultBlobs.push({fname,blob});

    const div=document.createElement('div');
    div.className='s-item'; div.title=fname;
    const imgEl=document.createElement('img'); imgEl.src=dataUrl;
    const numEl=document.createElement('span'); numEl.className='n';
    numEl.textContent=String(i+1).padStart(2,'0');
    div.appendChild(imgEl); div.appendChild(numEl);
    div.addEventListener('click',()=>downloadBlob(blob,fname));
    stickerGrid.appendChild(div);

    progBar.style.width=`${((i+1)/TOTAL)*100}%`;
    progLbl.textContent=`${i+1} / ${TOTAL}`;
    await tick();
  }

  addLog('ok',`\n✓ 완료: ${TOTAL}개 파일 (${CELL_W} × ${CELL_H} px)`);
  runBtn.disabled=false;
}

// ── ZIP ───────────────────────────────────────────────────
dlBtn.addEventListener('click', async()=>{
  if(!resultBlobs.length) return;
  dlBtn.disabled=true; dlBtn.textContent='압축 중…';
  const zip=new JSZip();
  resultBlobs.forEach(({fname,blob})=>zip.file(fname,blob));
  const zb=await zip.generateAsync({type:'blob'});
  downloadBlob(zb,'stickers_ogq.zip');
  dlBtn.disabled=false; dlBtn.textContent='⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)';
});

// ── 유틸 ─────────────────────────────────────────────────
function toBlob(c){return new Promise(r=>c.toBlob(r,'image/png'))}
function tick(){return new Promise(r=>requestAnimationFrame(r))}
function clamp(v,a,b){return Math.min(Math.max(v,a),b)}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function addLog(cls,msg){
  const s=document.createElement('span');
  s.className=cls; s.textContent=msg+'\n';
  logEl.appendChild(s); logEl.scrollTop=logEl.scrollHeight;
}
})();
</script>
</body>
</html>
