<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OGQ 스티커 분할기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 36px;
    }

    /* 드롭존 */
    #drop-zone {
      width: 100%;
      max-width: 560px;
      border: 2px dashed #3a3a52;
      border-radius: 16px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.05);
    }
    #drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    #drop-zone .icon { font-size: 2.4rem; margin-bottom: 12px; }
    #drop-zone p { font-size: 0.9rem; color: #aaa; line-height: 1.6; }
    #drop-zone strong { color: #c4b5fd; }

    /* 설정 패널 */
    #settings {
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      background: #1a1a26;
      border-radius: 14px;
      padding: 20px 24px;
      display: none;
      gap: 14px;
      flex-direction: column;
    }
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .setting-row label { font-size: 0.82rem; color: #aaa; white-space: nowrap; }
    .setting-row input[type="number"] {
      width: 90px;
      background: #0f0f18;
      border: 1px solid #33334d;
      border-radius: 8px;
      color: #e8e8f0;
      padding: 6px 10px;
      font-size: 0.85rem;
      text-align: right;
    }
    .setting-row input[type="number"]:focus { outline: none; border-color: #a78bfa; }
    .setting-row span { font-size: 0.78rem; color: #666; }

    /* 미리보기 */
    #preview-wrap {
      width: 100%;
      max-width: 560px;
      margin-top: 24px;
      display: none;
    }
    #preview-wrap p { font-size: 0.78rem; color: #888; margin-bottom: 8px; }
    #preview-canvas {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #2a2a3e;
      display: block;
    }

    /* 실행 버튼 */
    #run-btn {
      margin-top: 28px;
      padding: 14px 48px;
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      cursor: pointer;
      display: none;
      transition: opacity 0.2s, transform 0.1s;
    }
    #run-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    #run-btn:active { transform: translateY(0); }

    /* 진행 */
    #progress-wrap {
      width: 100%;
      max-width: 560px;
      margin-top: 20px;
      display: none;
    }
    #progress-bar-bg {
      height: 6px;
      background: #2a2a3e;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7c3aed, #2563eb);
      border-radius: 99px;
      transition: width 0.15s;
    }
    #progress-label {
      font-size: 0.78rem;
      color: #888;
      margin-top: 6px;
      text-align: right;
    }

    /* 결과 그리드 */
    #result-section {
      width: 100%;
      max-width: 560px;
      margin-top: 32px;
      display: none;
    }
    #result-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 14px;
      color: #c4b5fd;
    }
    #sticker-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 6px;
    }
    .sticker-item {
      position: relative;
      aspect-ratio: 740/640;
      background: repeating-conic-gradient(#1e1e2e 0% 25%, #252535 0% 50%) 0 0 / 12px 12px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
    }
    .sticker-item img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .sticker-item .num {
      position: absolute;
      bottom: 3px; right: 5px;
      font-size: 9px; color: rgba(255,255,255,0.5);
      pointer-events: none;
    }

    #download-all-btn {
      margin-top: 20px;
      width: 100%;
      padding: 13px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #059669, #0891b2);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #download-all-btn:hover { opacity: 0.88; }

    #log {
      width: 100%;
      max-width: 560px;
      margin-top: 20px;
      background: #0f0f18;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 0.75rem;
      color: #6b7280;
      font-family: 'Fira Code', monospace;
      line-height: 1.7;
      display: none;
      max-height: 220px;
      overflow-y: auto;
    }
    .log-ok  { color: #34d399; }
    .log-err { color: #f87171; }
    .log-info { color: #60a5fa; }
  </style>
</head>
<body>

<h1>OGQ 스티커 분할기</h1>
<p class="subtitle">스티커 시트 PNG → 740 × 640px × 24개 자동 분할</p>

<!-- 드롭존 -->
<div id="drop-zone">
  <input type="file" id="file-input" accept="image/png,image/webp" />
  <div class="icon">🖼️</div>
  <p><strong>PNG 파일을 드래그</strong>하거나 클릭해서 선택하세요</p>
  <p style="margin-top:8px;font-size:0.75rem;">6열 × 4행 · 총 24개 스티커</p>
</div>

<!-- 설정 -->
<div id="settings">
  <div class="setting-row">
    <label>작업 영역 너비</label>
    <div style="display:flex;align-items:center;gap:6px">
      <input type="number" id="cfg-canvas-w" value="4440" min="1" />
      <span>px</span>
    </div>
  </div>
  <div class="setting-row">
    <label>작업 영역 높이</label>
    <div style="display:flex;align-items:center;gap:6px">
      <input type="number" id="cfg-canvas-h" value="2560" min="1" />
      <span>px</span>
    </div>
  </div>
  <div class="setting-row">
    <label>열 수 (Columns)</label>
    <div style="display:flex;align-items:center;gap:6px">
      <input type="number" id="cfg-cols" value="6" min="1" max="20" />
      <span>개</span>
    </div>
  </div>
  <div class="setting-row">
    <label>행 수 (Rows)</label>
    <div style="display:flex;align-items:center;gap:6px">
      <input type="number" id="cfg-rows" value="4" min="1" max="20" />
      <span>개</span>
    </div>
  </div>
  <div class="setting-row">
    <label>셀 크기 <span style="color:#555">(자동 계산)</span></label>
    <span id="cell-size-display" style="color:#a78bfa;font-size:0.85rem;">740 × 640 px</span>
  </div>
</div>

<!-- 미리보기 -->
<div id="preview-wrap">
  <p>원본 이미지 미리보기 (crop 영역 표시)</p>
  <canvas id="preview-canvas"></canvas>
</div>

<button id="run-btn">✂️ 분할 시작</button>

<!-- 진행바 -->
<div id="progress-wrap">
  <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  <div id="progress-label">0 / 24</div>
</div>

<!-- 결과 -->
<div id="result-section">
  <h2>분할 결과 — 클릭하면 개별 다운로드</h2>
  <div id="sticker-grid"></div>
  <button id="download-all-btn">⬇️ 전체 다운로드 (ZIP)</button>
</div>

<div id="log"></div>

<!-- JSZip CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(() => {
  let loadedImage = null;

  // ── 설정값 읽기 헬퍼 ──
  const num = id => parseInt(document.getElementById(id).value, 10) || 0;

  function cfg() {
    const canvasW = num('cfg-canvas-w');
    const canvasH = num('cfg-canvas-h');
    const cols    = num('cfg-cols');
    const rows    = num('cfg-rows');
    const cellW   = Math.round(canvasW / cols);
    const cellH   = Math.round(canvasH / rows);
    return { canvasW, canvasH, cols, rows, cellW, cellH };
  }

  function updateCellDisplay() {
    const { cellW, cellH } = cfg();
    document.getElementById('cell-size-display').textContent = `${cellW} × ${cellH} px`;
  }
  ['cfg-canvas-w','cfg-canvas-h','cfg-cols','cfg-rows'].forEach(id =>
    document.getElementById(id).addEventListener('input', () => {
      updateCellDisplay();
      if (loadedImage) drawPreview(loadedImage);
    })
  );

  // ── 드롭존 ──
  const dropZone  = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        loadedImage = img;
        drawPreview(img);
        document.getElementById('settings').style.display = 'flex';
        document.getElementById('preview-wrap').style.display = 'block';
        document.getElementById('run-btn').style.display = 'inline-block';
        document.getElementById('result-section').style.display = 'none';
        document.getElementById('sticker-grid').innerHTML = '';
        document.getElementById('log').style.display = 'none';
        document.getElementById('log').innerHTML = '';
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── 미리보기 (crop 사각형 표시) ──
  function drawPreview(img) {
    const { canvasW, canvasH } = cfg();
    const canvas = document.getElementById('preview-canvas');
    const scale  = Math.min(1, 540 / img.naturalWidth);
    canvas.width  = img.naturalWidth  * scale;
    canvas.height = img.naturalHeight * scale;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    const cropX = 0;
    const cropY = Math.round((img.naturalHeight - canvasH) / 2);
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 3]);
    ctx.strokeRect(cropX * scale, cropY * scale, canvasW * scale, canvasH * scale);

    // 격자
    const { cols, rows, cellW, cellH } = cfg();
    ctx.strokeStyle = 'rgba(167,139,250,0.35)';
    ctx.lineWidth = 1;
    for (let c = 1; c < cols; c++) {
      const x = (cropX + c * cellW) * scale;
      ctx.beginPath(); ctx.moveTo(x, cropY * scale); ctx.lineTo(x, (cropY + canvasH) * scale); ctx.stroke();
    }
    for (let r = 1; r < rows; r++) {
      const y = (cropY + r * cellH) * scale;
      ctx.beginPath(); ctx.moveTo(cropX * scale, y); ctx.lineTo((cropX + canvasW) * scale, y); ctx.stroke();
    }
  }

  // ── 분할 실행 ──
  document.getElementById('run-btn').addEventListener('click', () => splitStickers());

  async function splitStickers() {
    if (!loadedImage) return;
    const img = loadedImage;
    const { canvasW, canvasH, cols, rows, cellW, cellH } = cfg();
    const total = cols * rows;

    // crop_y (세로 중앙 정렬)
    const cropY = Math.round((img.naturalHeight - canvasH) / 2);
    const cropX = 0;

    // 원본을 오프스크린 캔버스에 그리기
    const srcCanvas = document.createElement('canvas');
    srcCanvas.width  = img.naturalWidth;
    srcCanvas.height = img.naturalHeight;
    const srcCtx = srcCanvas.getContext('2d');
    srcCtx.drawImage(img, 0, 0);

    // 진행바 표시
    const pw = document.getElementById('progress-wrap');
    const pb = document.getElementById('progress-bar');
    const pl = document.getElementById('progress-label');
    pw.style.display = 'block';
    pb.style.width = '0%';

    const logEl = document.getElementById('log');
    logEl.style.display = 'block';
    logEl.innerHTML = `<span class="log-info">▶ 분할 시작 — 원본: ${img.naturalWidth} × ${img.naturalHeight}px</span>\n`;
    logEl.innerHTML += `<span class="log-info">  crop_y = round((${img.naturalHeight} - ${canvasH}) / 2) = ${cropY}</span>\n`;
    logEl.innerHTML += `<span class="log-info">  셀 크기: ${cellW} × ${cellH}px</span>\n\n`;

    const grid   = document.getElementById('sticker-grid');
    grid.innerHTML = '';
    document.getElementById('result-section').style.display = 'block';
    document.getElementById('result-section').querySelector('h2').textContent =
      `분할 결과 — 클릭하면 개별 다운로드`;

    const blobs = [];

    for (let i = 0; i < total; i++) {
      const row = Math.floor(i / cols);
      const col = i % cols;

      const sx = cropX + col * cellW;
      const sy = cropY + row * cellH;

      // 셀 캔버스
      const cellCanvas = document.createElement('canvas');
      cellCanvas.width  = cellW;
      cellCanvas.height = cellH;
      const cellCtx = cellCanvas.getContext('2d');
      cellCtx.drawImage(srcCanvas, sx, sy, cellW, cellH, 0, 0, cellW, cellH);

      const w = cellCanvas.width, h = cellCanvas.height;
      const ok = (w === cellW && h === cellH);
      const fname = `sticker_${String(i + 1).padStart(2, '0')}.png`;

      logEl.innerHTML +=
        `<span class="${ok ? 'log-ok' : 'log-err'}">${fname}  ${w} × ${h}px  [${ok ? 'OK' : 'ERROR'}]</span>\n`;

      // Blob 생성
      const blob = await new Promise(res => cellCanvas.toBlob(res, 'image/png'));
      blobs.push({ fname, blob, dataUrl: cellCanvas.toDataURL('image/png') });

      // 그리드 아이템
      const div = document.createElement('div');
      div.className = 'sticker-item';
      div.title = fname;
      const imgEl = document.createElement('img');
      imgEl.src = blobs[i].dataUrl;
      const numEl = document.createElement('span');
      numEl.className = 'num';
      numEl.textContent = String(i + 1).padStart(2, '0');
      div.appendChild(imgEl);
      div.appendChild(numEl);
      div.addEventListener('click', () => downloadBlob(blob, fname));
      grid.appendChild(div);

      // 진행
      pb.style.width = `${((i + 1) / total) * 100}%`;
      pl.textContent = `${i + 1} / ${total}`;
      await new Promise(r => setTimeout(r, 0)); // UI 업데이트
    }

    logEl.innerHTML += `\n<span class="log-ok">✓ 완료: ${total}개 파일 생성</span>\n`;
    logEl.scrollTop = logEl.scrollHeight;

    // ZIP 다운로드 버튼
    const dlBtn = document.getElementById('download-all-btn');
    dlBtn.onclick = async () => {
      dlBtn.disabled = true;
      dlBtn.textContent = '압축 중…';
      const zip = new JSZip();
      blobs.forEach(({ fname, blob }) => zip.file(fname, blob));
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      downloadBlob(zipBlob, 'stickers_ogq.zip');
      dlBtn.disabled = false;
      dlBtn.textContent = '⬇️ 전체 다운로드 (ZIP)';
    };
  }

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }
})();
</script>
</body>
</html>
