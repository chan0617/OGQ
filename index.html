<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OGQ 스티커 패키저</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;
  background:#0d0d14;color:#dde0f0;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:36px 16px 72px;
}
h1{
  font-size:1.5rem;font-weight:700;margin-bottom:4px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{font-size:.8rem;color:#555;margin-bottom:28px}

/* 드롭존 */
#drop-zone{
  width:100%;max-width:760px;
  border:2px dashed #2a2a42;border-radius:14px;
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
#drop-zone:hover,#drop-zone.over{border-color:#a78bfa;background:rgba(167,139,250,.06)}
#drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#drop-zone .ico{font-size:2.2rem;margin-bottom:12px}
#drop-zone p{font-size:.88rem;color:#888;line-height:1.7}
#drop-zone strong{color:#c4b5fd}

/* 옵션 패널 */
#opt-panel{
  width:100%;max-width:760px;margin-top:16px;
  background:#161622;border-radius:12px;padding:16px 20px;
  display:none;gap:16px;flex-direction:column;
}
.opt-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.opt-row label{font-size:.82rem;color:#aaa;white-space:nowrap}
.toggle-group{display:flex;gap:6px}
.tog{
  padding:5px 14px;font-size:.78rem;font-weight:600;
  border:1px solid #2e2e48;border-radius:7px;
  background:transparent;color:#666;cursor:pointer;transition:all .18s;
}
.tog.active{background:#7c3aed;border-color:#7c3aed;color:#fff}
.opt-note{font-size:.72rem;color:#555}

/* 업로드 목록 */
#file-list-wrap{
  width:100%;max-width:760px;margin-top:16px;display:none;
}
#file-list-wrap h3{font-size:.8rem;font-weight:600;color:#888;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center}
#file-list-wrap h3 span{color:#a78bfa}
#file-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:6px;
}
.f-item{
  position:relative;
  background:#111120;border:1px solid #1e1e30;border-radius:6px;
  overflow:hidden;cursor:grab;
}
.f-item.dragging-over{border-color:#a78bfa;background:#1a1a2e}
.f-item .thumb{
  width:100%;aspect-ratio:740/640;
  background:repeating-conic-gradient(#14141e 0% 25%,#1a1a26 0% 50%) 0 0/10px 10px;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.f-item .thumb img{max-width:100%;max-height:100%;object-fit:contain;display:block}
.f-item .f-meta{padding:4px 5px;font-size:9px;color:#555;line-height:1.5}
.f-item .f-num{
  position:absolute;top:3px;left:4px;
  background:rgba(124,58,237,.8);color:#fff;
  font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;
}
.f-item .f-del{
  position:absolute;top:3px;right:4px;
  background:rgba(239,68,68,.8);color:#fff;border:none;
  font-size:10px;padding:1px 5px;border-radius:4px;cursor:pointer;
  display:none;
}
.f-item:hover .f-del{display:block}
.add-slot{
  aspect-ratio:740/640;background:#0f0f1a;border:1px dashed #222234;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:1.4rem;color:#333;cursor:pointer;position:relative;
}
.add-slot input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* 실행 버튼 */
#run-btn{
  margin-top:20px;padding:13px 52px;
  font-size:.92rem;font-weight:700;border:none;border-radius:11px;
  background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;
  cursor:pointer;display:none;transition:opacity .2s,transform .1s;
}
#run-btn:hover{opacity:.87;transform:translateY(-1px)}
#run-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}

/* 진행 */
#prog-wrap{width:100%;max-width:760px;margin-top:16px;display:none}
#prog-bg{height:5px;background:#1a1a2a;border-radius:99px;overflow:hidden}
#prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .1s}
#prog-lbl{font-size:.72rem;color:#555;margin-top:5px;text-align:right}

/* 결과 */
#result-sec{width:100%;max-width:760px;margin-top:28px;display:none}
#result-sec h2{font-size:.92rem;font-weight:600;color:#c4b5fd;margin-bottom:12px}
#out-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.out-item{
  position:relative;aspect-ratio:740/640;
  background:repeating-conic-gradient(#1a1a26 0% 25%,#202030 0% 50%) 0 0/10px 10px;
  border-radius:5px;overflow:hidden;cursor:pointer;
}
.out-item img{width:100%;height:100%;object-fit:contain;display:block}
.out-item .on{position:absolute;bottom:2px;right:4px;font-size:9px;color:rgba(255,255,255,.4)}
.out-item .o-size{position:absolute;bottom:2px;left:4px;font-size:8px;color:rgba(255,255,255,.35)}

#dl-btn{
  margin-top:12px;width:100%;padding:12px;
  font-size:.88rem;font-weight:600;border:none;border-radius:10px;
  background:linear-gradient(135deg,#059669,#0891b2);color:#fff;
  cursor:pointer;transition:opacity .2s;
}
#dl-btn:hover{opacity:.87}
#dl-btn:disabled{opacity:.35;cursor:not-allowed}

/* 로그 */
#log{
  width:100%;max-width:760px;margin-top:12px;
  background:#080810;border-radius:9px;padding:12px 14px;
  font-size:.72rem;color:#555;font-family:monospace;
  line-height:1.8;display:none;max-height:220px;overflow-y:auto;white-space:pre;
}
.ok{color:#34d399}.er{color:#f87171}.inf{color:#60a5fa}.wn{color:#fbbf24}
</style>
</head>
<body>

<h1>OGQ 스티커 패키저</h1>
<p class="sub">개별 스티커 PNG → 740 × 640px 투명 캔버스 중앙 배치 → 24개 저장</p>

<!-- 드롭존 -->
<div id="drop-zone">
  <input type="file" id="file-in" accept="image/png,image/webp" multiple/>
  <div class="ico">🗂️</div>
  <p><strong>스티커 PNG 파일들을 드래그</strong>하거나 클릭해서 선택</p>
  <p>최대 24개 · 개별 파일 · 순서대로 sticker_01 ~ sticker_24 저장</p>
</div>

<!-- 옵션 -->
<div id="opt-panel">
  <div class="opt-row">
    <label>작은 이미지 확대</label>
    <div class="toggle-group">
      <button class="tog" id="upscale-no" onclick="setUpscale(false)">확대 안 함 (원본 크기 유지)</button>
      <button class="tog active" id="upscale-yes" onclick="setUpscale(true)">캔버스에 맞게 확대</button>
    </div>
  </div>
  <div class="opt-note">
    * 원본보다 큰 경우: 항상 비율 유지하여 축소 · 배경은 항상 투명
  </div>
</div>

<!-- 파일 목록 -->
<div id="file-list-wrap">
  <h3>업로드된 파일 <span id="file-count">0 / 24</span></h3>
  <div id="file-grid"></div>
</div>

<button id="run-btn">✨ 패키징 시작</button>

<div id="prog-wrap">
  <div id="prog-bg"><div id="prog-bar"></div></div>
  <div id="prog-lbl">0 / 24</div>
</div>

<div id="result-sec">
  <h2>결과 — 클릭하면 개별 다운로드</h2>
  <div id="out-grid"></div>
  <button id="dl-btn">⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)</button>
</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(()=>{
'use strict';

const CANVAS_W = 740, CANVAS_H = 640;

let files   = [];   // {file, img, name, w, h}
let doUpscale = true;
let resultBlobs = [];

// ── DOM ──────────────────────────────────────────────────
const dropZone    = document.getElementById('drop-zone');
const fileIn      = document.getElementById('file-in');
const optPanel    = document.getElementById('opt-panel');
const fileListWrap= document.getElementById('file-list-wrap');
const fileCountEl = document.getElementById('file-count');
const fileGrid    = document.getElementById('file-grid');
const runBtn      = document.getElementById('run-btn');
const progWrap    = document.getElementById('prog-wrap');
const progBar     = document.getElementById('prog-bar');
const progLbl     = document.getElementById('prog-lbl');
const resultSec   = document.getElementById('result-sec');
const outGrid     = document.getElementById('out-grid');
const dlBtn       = document.getElementById('dl-btn');
const logEl       = document.getElementById('log');

// ── 옵션 ─────────────────────────────────────────────────
window.setUpscale = (v)=>{
  doUpscale = v;
  document.getElementById('upscale-yes').classList.toggle('active', v);
  document.getElementById('upscale-no').classList.toggle('active', !v);
};

// ── 파일 드롭/선택 ────────────────────────────────────────
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{
  e.preventDefault(); dropZone.classList.remove('over');
  addFiles(e.dataTransfer.files);
});
fileIn.addEventListener('change', ()=>{ addFiles(fileIn.files); fileIn.value=''; });

async function addFiles(fileList){
  const newFiles = Array.from(fileList).filter(f=>f.type.startsWith('image/'));
  const remaining = 24 - files.length;
  const toAdd = newFiles.slice(0, remaining);
  for(const f of toAdd){
    const img = await loadImage(f);
    files.push({ file:f, img, name:f.name, w:img.naturalWidth, h:img.naturalHeight });
  }
  renderFileGrid();
  optPanel.style.display    = files.length ? 'flex' : 'none';
  fileListWrap.style.display= files.length ? 'block' : 'none';
  runBtn.style.display      = files.length ? 'inline-block' : 'none';
}

function loadImage(file){
  return new Promise((res,rej)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{ URL.revokeObjectURL(url); res(img); };
    img.onerror=rej;
    img.src=url;
  });
}

// ── 파일 그리드 렌더링 ────────────────────────────────────
function renderFileGrid(){
  fileGrid.innerHTML='';
  fileCountEl.textContent=`${files.length} / 24`;

  files.forEach((f, i)=>{
    const div=document.createElement('div');
    div.className='f-item';
    div.draggable=true;

    const thumb=document.createElement('div'); thumb.className='thumb';
    const imgEl=document.createElement('img'); imgEl.src=f.img.src;
    thumb.appendChild(imgEl);

    const meta=document.createElement('div'); meta.className='f-meta';
    meta.textContent=`${f.w}×${f.h}`;

    const num=document.createElement('div'); num.className='f-num';
    num.textContent=String(i+1).padStart(2,'0');

    const del=document.createElement('button'); del.className='f-del';
    del.textContent='✕'; del.title='제거';
    del.addEventListener('click', e=>{ e.stopPropagation(); files.splice(i,1); renderFileGrid(); });

    div.appendChild(thumb); div.appendChild(meta); div.appendChild(num); div.appendChild(del);

    // 드래그 정렬
    div.addEventListener('dragstart', ()=>{ div.dataset.idx=i; div.style.opacity='.4'; });
    div.addEventListener('dragend',   ()=>{ div.style.opacity='1'; });
    div.addEventListener('dragover',  e=>{ e.preventDefault(); div.classList.add('dragging-over'); });
    div.addEventListener('dragleave', ()=>div.classList.remove('dragging-over'));
    div.addEventListener('drop', e=>{
      e.preventDefault(); div.classList.remove('dragging-over');
      const from=parseInt(e.dataTransfer.getData('text')||div.dataset.fromIdx||'0');
      // 드롭 시 인덱스 교환
      const fromDiv = fileGrid.querySelector(`[data-drag-idx="${from}"]`);
      if(from!==i){ [files[from],files[i]]=[files[i],files[from]]; renderFileGrid(); }
    });
    div.dataset.dragIdx=i;
    div.addEventListener('dragstart', e=>e.dataTransfer.setData('text',i));

    fileGrid.appendChild(div);
  });

  // 슬롯 추가 버튼
  if(files.length < 24){
    const slot=document.createElement('div'); slot.className='add-slot';
    slot.innerHTML='<input type="file" accept="image/png,image/webp" multiple/>+';
    slot.querySelector('input').addEventListener('change', e=>{ addFiles(e.target.files); e.target.value=''; });
    fileGrid.appendChild(slot);
  }

  runBtn.style.display = files.length ? 'inline-block' : 'none';
}

// ── 패키징 실행 ──────────────────────────────────────────
runBtn.addEventListener('click', processStickers);

async function processStickers(){
  if(!files.length){ alert('파일을 먼저 업로드해주세요.'); return; }

  logEl.style.display='block'; logEl.innerHTML='';
  addLog('inf',`▶ 패키징 시작 — ${files.length}개 파일`);
  addLog('inf',`  캔버스: ${CANVAS_W} × ${CANVAS_H} px  확대: ${doUpscale?'ON':'OFF'}\n`);

  runBtn.disabled=true;
  progWrap.style.display='block';
  progBar.style.width='0%';
  resultSec.style.display='block';
  outGrid.innerHTML='';
  resultBlobs=[];

  for(let i=0;i<files.length;i++){
    const {img, name, w, h} = files[i];
    const fname=`sticker_${String(i+1).padStart(2,'0')}.png`;

    // ── 740×640 투명 캔버스 생성 ──────────────────────────
    const cvs=document.createElement('canvas');
    cvs.width=CANVAS_W; cvs.height=CANVAS_H;
    const ctx=cvs.getContext('2d');
    ctx.clearRect(0,0,CANVAS_W,CANVAS_H); // 투명 배경

    // ── 비율 유지 크기 계산 ───────────────────────────────
    let ratio = Math.min(CANVAS_W/w, CANVAS_H/h);
    if(!doUpscale && ratio > 1) ratio = 1; // 작은 이미지 확대 안 함

    const dw = Math.round(w * ratio);
    const dh = Math.round(h * ratio);
    const dx = Math.round((CANVAS_W - dw) / 2);
    const dy = Math.round((CANVAS_H - dh) / 2);

    // ── 원본 이미지 직접 그리기 (고품질) ─────────────────
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(img, 0, 0, w, h, dx, dy, dw, dh);

    const fw=cvs.width, fh=cvs.height;
    const ok=fw===CANVAS_W&&fh===CANVAS_H;
    addLog(ok?'ok':'er',
      `  ${fname}  최종:${fw}×${fh}  원본:${w}×${h}  배치:${dw}×${dh}@(${dx},${dy})  [${ok?'OK':'ERROR'}]`);

    const blob=await toBlob(cvs);
    const dataUrl=cvs.toDataURL('image/png');
    resultBlobs.push({fname,blob});

    // 결과 그리드
    const div=document.createElement('div'); div.className='out-item'; div.title=`${fname}\n원본: ${name}`;
    const imgEl=document.createElement('img'); imgEl.src=dataUrl;
    const numEl=document.createElement('span'); numEl.className='on'; numEl.textContent=String(i+1).padStart(2,'0');
    const szEl=document.createElement('span'); szEl.className='o-size'; szEl.textContent=`${fw}×${fh}`;
    div.appendChild(imgEl); div.appendChild(numEl); div.appendChild(szEl);
    div.addEventListener('click',()=>downloadBlob(blob,fname));
    outGrid.appendChild(div);

    progBar.style.width=`${((i+1)/files.length)*100}%`;
    progLbl.textContent=`${i+1} / ${files.length}`;
    await tick();
  }

  addLog('ok',`\n✓ 완료: ${files.length}개 → 모두 ${CANVAS_W}×${CANVAS_H}px PNG`);
  runBtn.disabled=false;
}

// ── ZIP ──────────────────────────────────────────────────
dlBtn.addEventListener('click', async()=>{
  if(!resultBlobs.length) return;
  dlBtn.disabled=true; dlBtn.textContent='압축 중…';
  const zip=new JSZip();
  resultBlobs.forEach(({fname,blob})=>zip.file(fname,blob));
  const zb=await zip.generateAsync({type:'blob'});
  downloadBlob(zb,'stickers_ogq.zip');
  dlBtn.disabled=false; dlBtn.textContent='⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)';
});

// ── 유틸 ─────────────────────────────────────────────────
function toBlob(c){return new Promise(r=>c.toBlob(r,'image/png'))}
function tick(){return new Promise(r=>requestAnimationFrame(r))}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function addLog(cls,msg){
  const s=document.createElement('span');
  s.className=cls; s.textContent=msg+'\n';
  logEl.appendChild(s); logEl.scrollTop=logEl.scrollHeight;
}
})();
</script>
</body>
</html>
