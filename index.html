<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OGQ 스티커 분할기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;
  background:#0d0d14;color:#dde0f0;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:32px 16px 72px;
}
h1{
  font-size:1.45rem;font-weight:700;margin-bottom:4px;
  background:linear-gradient(135deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{font-size:.78rem;color:#555;margin-bottom:26px}

/* 업로드 */
#drop-zone{
  width:100%;max-width:920px;
  border:2px dashed #252538;border-radius:14px;
  padding:44px 24px;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative;
}
#drop-zone:hover,#drop-zone.over{border-color:#a78bfa;background:rgba(167,139,250,.05)}
#drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
#drop-zone .ico{font-size:2rem;margin-bottom:10px}
#drop-zone p{font-size:.86rem;color:#888}
#drop-zone strong{color:#c4b5fd}

/* 툴바 */
#toolbar{
  width:100%;max-width:920px;margin-top:12px;
  display:none;align-items:center;gap:8px;flex-wrap:wrap;
}
.tb-btn{
  padding:7px 16px;font-size:.78rem;font-weight:600;
  border:1px solid #252538;border-radius:8px;
  background:#141420;color:#aaa;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.tb-btn:hover{border-color:#7c3aed;color:#a78bfa}
.tb-btn.pri{
  background:linear-gradient(135deg,#7c3aed,#2563eb);
  border-color:transparent;color:#fff;
}
.tb-btn.pri:hover{opacity:.88}
.tb-btn.pri:disabled{opacity:.35;cursor:not-allowed}
.tb-sep{width:1px;height:24px;background:#252538;margin:0 4px}
.tb-info{font-size:.72rem;color:#555;margin-left:auto;white-space:nowrap}

/* 캔버스 */
#canvas-wrap{
  width:100%;max-width:920px;margin-top:10px;display:none;
  position:relative;
}
#main-canvas{
  display:block;width:100%;border-radius:10px;
  border:1px solid #1c1c2c;background:#000;
}

/* 라인 좌표 패널 */
#line-panel{
  width:100%;max-width:920px;margin-top:10px;
  display:none;
  background:#111120;border-radius:10px;padding:12px 16px;
  font-size:.72rem;color:#666;font-family:monospace;line-height:2;
}
#line-panel .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
#line-panel label{color:#888;margin-right:2px}
.lv{
  display:inline-block;min-width:48px;padding:2px 6px;
  background:#0d0d1a;border:1px solid #1e1e30;border-radius:5px;
  color:#a78bfa;text-align:right;font-family:monospace;font-size:.72rem;
  cursor:text;outline:none;
}
.lv:focus{border-color:#7c3aed}

/* 진행 */
#prog-wrap{width:100%;max-width:920px;margin-top:14px;display:none}
#prog-bg{height:5px;background:#1a1a2a;border-radius:99px;overflow:hidden}
#prog-bar{height:100%;width:0%;background:linear-gradient(90deg,#7c3aed,#2563eb);transition:width .1s}
#prog-lbl{font-size:.7rem;color:#555;margin-top:4px;text-align:right}

/* 결과 */
#result-sec{width:100%;max-width:920px;margin-top:24px;display:none}
#result-sec h2{font-size:.88rem;font-weight:600;color:#c4b5fd;margin-bottom:10px}
#out-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.out-item{
  position:relative;aspect-ratio:1/1;
  background:repeating-conic-gradient(#181826 0% 25%,#1e1e2e 0% 50%) 0 0/8px 8px;
  border-radius:4px;overflow:hidden;cursor:pointer;border:1px solid #1e1e30;
}
.out-item:hover{border-color:#7c3aed}
.out-item img{width:100%;height:100%;object-fit:contain;display:block}
.out-item .on{position:absolute;bottom:2px;right:3px;font-size:8px;color:rgba(255,255,255,.35)}
.out-item .sz{position:absolute;top:2px;left:3px;font-size:7px;color:rgba(255,255,255,.3)}

#dl-btn{
  margin-top:10px;width:100%;padding:11px;
  font-size:.86rem;font-weight:600;border:none;border-radius:10px;
  background:linear-gradient(135deg,#059669,#0891b2);color:#fff;
  cursor:pointer;transition:opacity .2s;
}
#dl-btn:hover{opacity:.87}
#dl-btn:disabled{opacity:.35;cursor:not-allowed}

/* 로그 */
#log{
  width:100%;max-width:920px;margin-top:10px;
  background:#070710;border-radius:8px;padding:10px 14px;
  font-size:.7rem;color:#555;font-family:monospace;
  line-height:1.8;display:none;max-height:200px;overflow-y:auto;white-space:pre;
}
.ok{color:#34d399}.er{color:#f87171}.inf{color:#60a5fa}
</style>
</head>
<body>

<h1>OGQ 스티커 분할기</h1>
<p class="sub">가이드선을 드래그해서 24칸을 직접 맞추고 → 원본 화질 그대로 PNG 저장</p>

<div id="drop-zone">
  <input type="file" id="file-in" accept="image/*"/>
  <div class="ico">🖼️</div>
  <p><strong>합본 이미지를 드래그</strong>하거나 클릭해서 업로드</p>
  <p style="margin-top:6px;font-size:.72rem;color:#444">6열 × 4행 · 24개 스티커 · 원본 화질 crop</p>
</div>

<!-- 툴바 -->
<div id="toolbar">
  <button class="tb-btn" id="btn-fit"  onclick="autoFit()">⊞ 자동 균등 분할</button>
  <button class="tb-btn" id="btn-top"  onclick="alignTop()">↑ 여백 자동 제거</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-reset" onclick="resetGrid()">↺ 초기화</button>
  <div class="tb-sep"></div>
  <button class="tb-btn pri" id="run-btn" onclick="splitStickers()">✂️ 분할 저장</button>
  <span class="tb-info" id="tb-info">—</span>
</div>

<!-- 캔버스 -->
<div id="canvas-wrap"><canvas id="main-canvas"></canvas></div>

<!-- 라인 좌표 직접 입력 -->
<div id="line-panel">
  <div class="row">
    <label>열 경계 (px):</label>
    <span id="v-inputs"></span>
  </div>
  <div class="row" style="margin-top:6px">
    <label>행 경계 (px):</label>
    <span id="h-inputs"></span>
  </div>
</div>

<div id="prog-wrap">
  <div id="prog-bg"><div id="prog-bar"></div></div>
  <div id="prog-lbl">0 / 24</div>
</div>

<div id="result-sec">
  <h2>분할 결과 — 클릭하면 개별 다운로드</h2>
  <div id="out-grid"></div>
  <button id="dl-btn">⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)</button>
</div>
<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(()=>{
'use strict';

// ── 상수 ──────────────────────────────────────────────────
const COLS=6, ROWS=4, TOTAL=24;
const HIT=8;       // 선 히트 범위 (canvas 내부 px)
const MIN_GAP=10;  // 선 간 최소 간격 (원본 px)

// ── 상태 ──────────────────────────────────────────────────
let origImg=null, srcCvs=null, dispScale=1;
// 경계선 (원본 이미지 픽셀)
// vLines: 7개 [L, c1..c5, R]  hLines: 5개 [T, r1..r3, B]
let vLines=[], hLines=[];
let dragLine=null;   // {type:'v'|'h', idx}
let resultBlobs=[];

// ── DOM ───────────────────────────────────────────────────
const dropZone  = document.getElementById('drop-zone');
const fileIn    = document.getElementById('file-in');
const toolbar   = document.getElementById('toolbar');
const runBtn    = document.getElementById('run-btn');
const tbInfo    = document.getElementById('tb-info');
const canvasWrap= document.getElementById('canvas-wrap');
const cvs       = document.getElementById('main-canvas');
const ctx       = cvs.getContext('2d');
const linePanel = document.getElementById('line-panel');
const vInputs   = document.getElementById('v-inputs');
const hInputs   = document.getElementById('h-inputs');
const progWrap  = document.getElementById('prog-wrap');
const progBar   = document.getElementById('prog-bar');
const progLbl   = document.getElementById('prog-lbl');
const resultSec = document.getElementById('result-sec');
const outGrid   = document.getElementById('out-grid');
const dlBtn     = document.getElementById('dl-btn');
const logEl     = document.getElementById('log');

// ── 파일 로드 ─────────────────────────────────────────────
dropZone.addEventListener('dragover', e=>{e.preventDefault();dropZone.classList.add('over')});
dropZone.addEventListener('dragleave', ()=>dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e=>{e.preventDefault();dropZone.classList.remove('over');loadFile(e.dataTransfer.files[0])});
fileIn.addEventListener('change', ()=>{if(fileIn.files[0])loadFile(fileIn.files[0])});

function loadFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img;
      srcCvs=document.createElement('canvas');
      srcCvs.width=img.naturalWidth; srcCvs.height=img.naturalHeight;
      srcCvs.getContext('2d').drawImage(img,0,0);
      initCanvas();
      autoFit();
      toolbar.style.display     ='flex';
      canvasWrap.style.display  ='block';
      linePanel.style.display   ='block';
      resultSec.style.display   ='none';
      logEl.style.display       ='none';
      outGrid.innerHTML='';
      resultBlobs=[];
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

// ── 캔버스 초기화 ─────────────────────────────────────────
function initCanvas(){
  const maxW=Math.min(920, window.innerWidth-32);
  const maxH=2000;
  dispScale=Math.min(maxW/origImg.naturalWidth, maxH/origImg.naturalHeight);
  cvs.width =Math.round(origImg.naturalWidth *dispScale);
  cvs.height=Math.round(origImg.naturalHeight*dispScale);
}
window.addEventListener('resize',()=>{ if(origImg){initCanvas();render();} });

// ── 그리드 초기화 (전체 이미지 균등 분할) ────────────────
window.autoFit=function(){
  const w=origImg.naturalWidth, h=origImg.naturalHeight;
  vLines=Array.from({length:COLS+1},(_,i)=>Math.round(i*w/COLS));
  hLines=Array.from({length:ROWS+1},(_,i)=>Math.round(i*h/ROWS));
  render(); updateInputs(); updateInfo();
};

// 상단/하단 여백 자동 제거: 이미지 중앙 기준 가로비율 맞추기
window.alignTop=function(){
  if(!origImg) return;
  const w=origImg.naturalWidth, h=origImg.naturalHeight;
  // 현재 가로 전체 폭 기준으로 세로 비율(4440:2560) 높이 추정
  const bw=vLines[COLS]-vLines[0];
  const bh=Math.round(bw*2560/4440);
  const top=Math.round((h-bh)/2);
  const bot=top+bh;
  hLines=Array.from({length:ROWS+1},(_,i)=>Math.round(top+i*bh/ROWS));
  render(); updateInputs(); updateInfo();
};

window.resetGrid=function(){ autoFit(); };

// ── 좌표 변환 ─────────────────────────────────────────────
function getMouse(e){
  const r=cvs.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(cvs.width/r.width);
  const cy=(e.clientY-r.top )*(cvs.height/r.height);
  return { cx, cy, ox:cx/dispScale, oy:cy/dispScale };
}

// ── 드래그 히트 탐지 ──────────────────────────────────────
function findHit(cx,cy){
  // 수직선 우선
  for(let i=0;i<vLines.length;i++){
    if(Math.abs(cx-vLines[i]*dispScale)<=HIT) return {type:'v',idx:i};
  }
  for(let i=0;i<hLines.length;i++){
    if(Math.abs(cy-hLines[i]*dispScale)<=HIT) return {type:'h',idx:i};
  }
  return null;
}

// ── 마우스 이벤트 ─────────────────────────────────────────
cvs.addEventListener('mousedown', e=>{
  dragLine=findHit(...Object.values(getMouse(e)).slice(0,2));
  if(dragLine) e.preventDefault();
});

cvs.addEventListener('mousemove', e=>{
  const {cx,cy,ox,oy}=getMouse(e);
  if(dragLine){
    if(dragLine.type==='v'){
      const prev=vLines[dragLine.idx-1]??-Infinity;
      const next=vLines[dragLine.idx+1]??Infinity;
      vLines[dragLine.idx]=Math.round(clamp(ox, prev+MIN_GAP, next-MIN_GAP));
    } else {
      const prev=hLines[dragLine.idx-1]??-Infinity;
      const next=hLines[dragLine.idx+1]??Infinity;
      hLines[dragLine.idx]=Math.round(clamp(oy, prev+MIN_GAP, next-MIN_GAP));
    }
    render(); updateInputs(); updateInfo();
    return;
  }
  // 커서 변경
  const h=findHit(cx,cy);
  cvs.style.cursor = h ? (h.type==='v'?'ew-resize':'ns-resize') : 'default';
});

window.addEventListener('mouseup',()=>{ dragLine=null; });

// 터치
cvs.addEventListener('touchstart', e=>{ cvs.dispatchEvent(new MouseEvent('mousedown',toME(e))); },{passive:false});
cvs.addEventListener('touchmove',  e=>{ e.preventDefault(); cvs.dispatchEvent(new MouseEvent('mousemove',toME(e))); },{passive:false});
cvs.addEventListener('touchend',   ()=>cvs.dispatchEvent(new MouseEvent('mouseup')));
function toME(e){ const t=e.touches[0]; return {clientX:t.clientX,clientY:t.clientY,bubbles:true}; }

// ── 렌더링 ────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.drawImage(origImg,0,0,cvs.width,cvs.height);
  if(!vLines.length||!hLines.length) return;

  const toC=v=>v*dispScale;

  // 바깥 어둡게 (4면 마스크)
  const lx=toC(vLines[0]),      rx=toC(vLines[COLS]);
  const ty=toC(hLines[0]),      by=toC(hLines[ROWS]);
  ctx.fillStyle='rgba(0,0,0,0.48)';
  ctx.fillRect(0,0,cvs.width,ty);
  ctx.fillRect(0,ty,lx,by-ty);
  ctx.fillRect(rx,ty,cvs.width-rx,by-ty);
  ctx.fillRect(0,by,cvs.width,cvs.height-by);

  // 바깥 테두리
  ctx.strokeStyle='#a78bfa';ctx.lineWidth=2;ctx.setLineDash([]);
  ctx.strokeRect(lx,ty,rx-lx,by-ty);

  // 내부 구분선 (수직)
  ctx.strokeStyle='rgba(255,255,255,0.85)';ctx.lineWidth=1;ctx.setLineDash([5,3]);
  for(let i=1;i<COLS;i++){
    const x=toC(vLines[i]);
    ctx.beginPath();ctx.moveTo(x,ty);ctx.lineTo(x,by);ctx.stroke();
  }
  // 내부 구분선 (수평)
  for(let i=1;i<ROWS;i++){
    const y=toC(hLines[i]);
    ctx.beginPath();ctx.moveTo(lx,y);ctx.lineTo(rx,y);ctx.stroke();
  }
  ctx.setLineDash([]);

  // 셀 번호
  const cellFontSize=Math.max(10,Math.min(18,(rx-lx)/COLS/3));
  ctx.font=`bold ${cellFontSize}px monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let row=0;row<ROWS;row++){
    for(let col=0;col<COLS;col++){
      const idx=row*COLS+col+1;
      const cx=(toC(vLines[col])+toC(vLines[col+1]))/2;
      const cy=(toC(hLines[row])+toC(hLines[row+1]))/2;
      ctx.fillStyle='rgba(0,0,0,0.45)';
      ctx.fillText(String(idx).padStart(2,'0'),cx+1,cy+1);
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillText(String(idx).padStart(2,'0'),cx,cy);
    }
  }

  // 핸들 표시 (드래그 가능한 선 위)
  ctx.fillStyle='#a78bfa';
  const HL=4;
  vLines.forEach(v=>{
    const x=toC(v);
    ctx.fillRect(x-HL/2, ty-HL, HL, HL*2);
    ctx.fillRect(x-HL/2, by-HL, HL, HL*2);
  });
  hLines.forEach(h=>{
    const y=toC(h);
    ctx.fillRect(lx-HL, y-HL/2, HL*2, HL);
    ctx.fillRect(rx-HL, y-HL/2, HL*2, HL);
  });
}

// ── 좌표 입력 패널 ────────────────────────────────────────
function updateInputs(){
  vInputs.innerHTML='';
  hInputs.innerHTML='';
  vLines.forEach((v,i)=>{
    const span=makeInput(v, newVal=>{
      vLines[i]=clamp(Math.round(newVal),
        (vLines[i-1]??0)+MIN_GAP,
        (vLines[i+1]??origImg.naturalWidth)-MIN_GAP);
      render(); updateInputs(); updateInfo();
    });
    vInputs.appendChild(span);
    if(i<vLines.length-1){const s=document.createElement('span');s.textContent=' · ';s.style.color='#333';vInputs.appendChild(s);}
  });
  hLines.forEach((h,i)=>{
    const span=makeInput(h, newVal=>{
      hLines[i]=clamp(Math.round(newVal),
        (hLines[i-1]??0)+MIN_GAP,
        (hLines[i+1]??origImg.naturalHeight)-MIN_GAP);
      render(); updateInputs(); updateInfo();
    });
    hInputs.appendChild(span);
    if(i<hLines.length-1){const s=document.createElement('span');s.textContent=' · ';s.style.color='#333';hInputs.appendChild(s);}
  });
}

function makeInput(val, onChange){
  const el=document.createElement('span');
  el.className='lv'; el.contentEditable='true';
  el.textContent=String(Math.round(val));
  el.addEventListener('blur', ()=>onChange(parseFloat(el.textContent)||0));
  el.addEventListener('keydown', e=>{if(e.key==='Enter'){e.preventDefault();el.blur();}});
  return el;
}

// ── 정보 표시 ─────────────────────────────────────────────
function updateInfo(){
  if(!vLines.length||!hLines.length){tbInfo.textContent='—';return;}
  const w=Math.round(vLines[COLS]-vLines[0]);
  const h=Math.round(hLines[ROWS]-hLines[0]);
  const cw=Math.round(w/COLS), ch=Math.round(h/ROWS);
  tbInfo.textContent=`전체 ${w}×${h}px · 셀 ${cw}×${ch}px`;
}

// ── 분할 실행 ─────────────────────────────────────────────
window.splitStickers=async function(){
  if(!origImg||!vLines.length||!hLines.length) return;
  logEl.style.display='block'; logEl.innerHTML='';
  addLog('inf',`▶ 분할 시작 — 원본: ${origImg.naturalWidth}×${origImg.naturalHeight}px`);
  addLog('inf',`  열 경계: [${vLines.map(v=>Math.round(v)).join(', ')}]`);
  addLog('inf',`  행 경계: [${hLines.map(h=>Math.round(h)).join(', ')}]\n`);

  runBtn.disabled=true;
  progWrap.style.display='block';
  progBar.style.width='0%';
  resultSec.style.display='block';
  outGrid.innerHTML='';
  resultBlobs=[];

  let allOk=true;
  for(let i=0;i<TOTAL;i++){
    const row=Math.floor(i/COLS), col=i%COLS;
    const sx=Math.round(vLines[col]),   sy=Math.round(hLines[row]);
    const sw=Math.round(vLines[col+1]-vLines[col]);
    const sh=Math.round(hLines[row+1]-hLines[row]);

    // 원본 srcCvs에서 직접 crop (리사이즈 없음)
    const cell=document.createElement('canvas');
    cell.width=sw; cell.height=sh;
    cell.getContext('2d').drawImage(srcCvs, sx, sy, sw, sh, 0, 0, sw, sh);

    const fname=`sticker_${String(i+1).padStart(2,'0')}.png`;
    addLog('ok',`  ${fname}  ${sw}×${sh}px  (원본좌표 x=${sx} y=${sy})`);
    if(sw<=0||sh<=0) allOk=false;

    const blob=await toBlob(cell);
    resultBlobs.push({fname,blob});

    // 결과 그리드
    const div=document.createElement('div'); div.className='out-item'; div.title=fname;
    const imgEl=document.createElement('img'); imgEl.src=cell.toDataURL('image/png');
    const numEl=document.createElement('span'); numEl.className='on';
    numEl.textContent=String(i+1).padStart(2,'0');
    const szEl=document.createElement('span'); szEl.className='sz';
    szEl.textContent=`${sw}×${sh}`;
    div.appendChild(imgEl); div.appendChild(numEl); div.appendChild(szEl);
    div.addEventListener('click',()=>downloadBlob(blob,fname));
    outGrid.appendChild(div);

    progBar.style.width=`${((i+1)/TOTAL)*100}%`;
    progLbl.textContent=`${i+1} / ${TOTAL}`;
    await tick();
  }

  addLog(allOk?'ok':'er',`\n${allOk?'✓':'✗'} 완료: ${TOTAL}개 파일 생성`);
  runBtn.disabled=false;
};

// ── ZIP ───────────────────────────────────────────────────
dlBtn.addEventListener('click',async()=>{
  if(!resultBlobs.length) return;
  dlBtn.disabled=true; dlBtn.textContent='압축 중…';
  const zip=new JSZip();
  resultBlobs.forEach(({fname,blob})=>zip.file(fname,blob));
  const zb=await zip.generateAsync({type:'blob'});
  downloadBlob(zb,'stickers_ogq.zip');
  dlBtn.disabled=false; dlBtn.textContent='⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)';
});

// ── 유틸 ─────────────────────────────────────────────────
function toBlob(c){return new Promise(r=>c.toBlob(r,'image/png'))}
function tick(){return new Promise(r=>requestAnimationFrame(r))}
function clamp(v,a,b){return Math.min(Math.max(v,a),b)}
function downloadBlob(blob,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}
function addLog(cls,msg){
  const s=document.createElement('span');
  s.className=cls; s.textContent=msg+'\n';
  logEl.appendChild(s); logEl.scrollTop=logEl.scrollHeight;
}
