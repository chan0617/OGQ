<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OGQ 스티커 분할기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 36px; }

    /* 드롭존 */
    #drop-zone {
      width: 100%; max-width: 600px;
      border: 2px dashed #3a3a52; border-radius: 16px;
      padding: 48px 24px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s; position: relative;
    }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #a78bfa; background: rgba(167,139,250,0.05); }
    #drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    #drop-zone .icon { font-size: 2.4rem; margin-bottom: 12px; }
    #drop-zone p { font-size: 0.9rem; color: #aaa; line-height: 1.6; }
    #drop-zone strong { color: #c4b5fd; }

    /* 카드 */
    .card {
      width: 100%; max-width: 600px;
      margin-top: 20px;
      background: #1a1a26; border-radius: 14px; padding: 20px 24px;
      display: none;
    }
    .card-title { font-size: 0.75rem; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

    /* 정보 행 */
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid #22223a; }
    .info-row:last-child { border-bottom: none; }
    .info-row label { font-size: 0.82rem; color: #888; }
    .info-row .val { font-size: 0.85rem; color: #e8e8f0; font-family: monospace; }
    .info-row .val.good { color: #34d399; }
    .info-row .val.warn { color: #fbbf24; }

    /* crop_y 슬라이더 */
    #crop-y-wrap { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: flex-end; }
    #crop-y-input {
      width: 80px; background: #0f0f18; border: 1px solid #33334d;
      border-radius: 8px; color: #e8e8f0; padding: 5px 10px;
      font-size: 0.85rem; text-align: right; font-family: monospace;
    }
    #crop-y-input:focus { outline: none; border-color: #a78bfa; }
    #crop-y-slider { flex: 1; max-width: 180px; accent-color: #a78bfa; }
    .auto-btn {
      font-size: 0.7rem; padding: 3px 8px; border: 1px solid #3a3a52;
      border-radius: 6px; background: transparent; color: #888; cursor: pointer; white-space: nowrap;
    }
    .auto-btn:hover { border-color: #a78bfa; color: #a78bfa; }

    /* 미리보기 캔버스 */
    #preview-wrap { width: 100%; max-width: 600px; margin-top: 20px; display: none; }
    #preview-wrap p { font-size: 0.75rem; color: #888; margin-bottom: 8px; }
    #preview-canvas { width: 100%; border-radius: 10px; border: 1px solid #2a2a3e; display: block; }

    /* 실행 버튼 */
    #run-btn {
      margin-top: 24px; padding: 14px 56px;
      font-size: 0.95rem; font-weight: 600; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #7c3aed, #2563eb); color: #fff;
      cursor: pointer; display: none; transition: opacity 0.2s, transform 0.1s;
    }
    #run-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    #run-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* 진행 */
    #progress-wrap { width: 100%; max-width: 600px; margin-top: 20px; display: none; }
    #progress-bar-bg { height: 6px; background: #2a2a3e; border-radius: 99px; overflow: hidden; }
    #progress-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #7c3aed, #2563eb); border-radius: 99px; transition: width 0.1s; }
    #progress-label { font-size: 0.78rem; color: #888; margin-top: 6px; text-align: right; }

    /* 결과 */
    #result-section { width: 100%; max-width: 600px; margin-top: 32px; display: none; }
    #result-section h2 { font-size: 1rem; font-weight: 600; margin-bottom: 14px; color: #c4b5fd; }
    #sticker-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; }
    .sticker-item {
      position: relative; aspect-ratio: 740/640;
      background: repeating-conic-gradient(#1e1e2e 0% 25%, #252535 0% 50%) 0 0 / 10px 10px;
      border-radius: 5px; overflow: hidden; cursor: pointer;
    }
    .sticker-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .sticker-item .num { position: absolute; bottom: 2px; right: 4px; font-size: 9px; color: rgba(255,255,255,0.5); }

    #download-all-btn {
      margin-top: 16px; width: 100%; padding: 13px;
      font-size: 0.9rem; font-weight: 600; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #059669, #0891b2); color: #fff;
      cursor: pointer; transition: opacity 0.2s;
    }
    #download-all-btn:hover { opacity: 0.88; }
    #download-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* 로그 */
    #log {
      width: 100%; max-width: 600px; margin-top: 16px;
      background: #0a0a12; border-radius: 10px; padding: 14px 16px;
      font-size: 0.73rem; color: #6b7280; font-family: 'Fira Code', monospace;
      line-height: 1.8; display: none; max-height: 260px; overflow-y: auto;
      white-space: pre;
    }
    .ok   { color: #34d399; }
    .err  { color: #f87171; }
    .info { color: #60a5fa; }
    .warn { color: #fbbf24; }
  </style>
</head>
<body>

<h1>OGQ 스티커 분할기</h1>
<p class="subtitle">스티커 시트 PNG → 740 × 640px × 24개 분할</p>

<!-- 드롭존 -->
<div id="drop-zone">
  <input type="file" id="file-input" accept="image/png,image/webp" />
  <div class="icon">🖼️</div>
  <p><strong>PNG 파일을 드래그</strong>하거나 클릭해서 선택</p>
  <p style="margin-top:8px;font-size:0.75rem;color:#555;">4440 × 3314.82px · 6열 × 4행 · 24개 스티커</p>
</div>

<!-- 이미지 정보 + crop_y 조정 -->
<div class="card" id="info-card">
  <div class="card-title">이미지 정보</div>
  <div class="info-row">
    <label>원본 크기</label>
    <span class="val" id="orig-size">—</span>
  </div>
  <div class="info-row">
    <label>목표 crop 영역</label>
    <span class="val good">4440 × 2560 px (고정)</span>
  </div>
  <div class="info-row">
    <label>셀 크기 (분할 후)</label>
    <span class="val good">740 × 640 px (고정)</span>
  </div>
  <div class="info-row" style="margin-top:4px">
    <label>crop_y <span style="color:#555;font-size:0.75rem">(세로 시작 좌표)</span></label>
    <div id="crop-y-wrap">
      <button class="auto-btn" id="auto-btn">자동 (중앙)</button>
      <input type="range" id="crop-y-slider" min="0" max="800" step="1" value="0" />
      <input type="number" id="crop-y-input" min="0" max="800" value="0" />
    </div>
  </div>
</div>

<!-- 미리보기 -->
<div id="preview-wrap">
  <p>미리보기 — 보라색 영역이 crop될 4440 × 2560px입니다. crop_y를 조정해서 스티커 위치를 맞춰주세요.</p>
  <canvas id="preview-canvas"></canvas>
</div>

<button id="run-btn">✂️ 분할 시작</button>

<!-- 진행바 -->
<div id="progress-wrap">
  <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  <div id="progress-label">0 / 24</div>
</div>

<!-- 결과 그리드 -->
<div id="result-section">
  <h2>분할 결과 — 스티커 클릭 시 개별 다운로드</h2>
  <div id="sticker-grid"></div>
  <button id="download-all-btn">⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)</button>
</div>

<div id="log"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
(() => {
  // ── 고정 상수 ──────────────────────────────────
  const CROP_W  = 4440;
  const CROP_H  = 2560;
  const COLS    = 6;
  const ROWS    = 4;
  const CELL_W  = CROP_W / COLS;   // 740
  const CELL_H  = CROP_H / ROWS;   // 640
  const TOTAL   = COLS * ROWS;     // 24

  let loadedImage  = null;
  let srcCanvas    = null;   // 원본 이미지를 그린 오프스크린 캔버스
  let resultBlobs  = [];

  // ── DOM ───────────────────────────────────────
  const dropZone    = document.getElementById('drop-zone');
  const fileInput   = document.getElementById('file-input');
  const infoCard    = document.getElementById('info-card');
  const origSizeEl  = document.getElementById('orig-size');
  const cropYInput  = document.getElementById('crop-y-input');
  const cropYSlider = document.getElementById('crop-y-slider');
  const autoBtn     = document.getElementById('auto-btn');
  const previewWrap = document.getElementById('preview-wrap');
  const previewCvs  = document.getElementById('preview-canvas');
  const runBtn      = document.getElementById('run-btn');
  const progressWrap= document.getElementById('progress-wrap');
  const progressBar = document.getElementById('progress-bar');
  const progressLbl = document.getElementById('progress-label');
  const resultSec   = document.getElementById('result-section');
  const stickerGrid = document.getElementById('sticker-grid');
  const dlAllBtn    = document.getElementById('download-all-btn');
  const logEl       = document.getElementById('log');

  // ── 파일 드롭 / 선택 ──────────────────────────
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); load(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) load(fileInput.files[0]); });

  function load(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        loadedImage = img;

        // 오프스크린 캔버스에 원본 이미지 1회 드로잉
        srcCanvas = document.createElement('canvas');
        srcCanvas.width  = img.naturalWidth;
        srcCanvas.height = img.naturalHeight;
        srcCanvas.getContext('2d').drawImage(img, 0, 0);

        // 원본 크기 표시
        origSizeEl.textContent = `${img.naturalWidth} × ${img.naturalHeight} px`;
        origSizeEl.className = 'val' + (img.naturalWidth === CROP_W ? ' good' : ' warn');

        // crop_y 자동 계산 (중앙)
        const autoCropY = Math.round((img.naturalHeight - CROP_H) / 2);
        const maxCropY  = Math.max(0, img.naturalHeight - CROP_H);
        cropYSlider.max   = maxCropY;
        cropYInput.max    = maxCropY;
        setCropY(autoCropY);

        infoCard.style.display    = 'block';
        previewWrap.style.display = 'block';
        runBtn.style.display      = 'inline-block';
        resultSec.style.display   = 'none';
        logEl.style.display       = 'none';
        logEl.innerHTML           = '';
        stickerGrid.innerHTML     = '';
        resultBlobs               = [];

        drawPreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ── crop_y 동기화 ─────────────────────────────
  function setCropY(val) {
    val = Math.max(0, Math.min(val, parseInt(cropYSlider.max) || 0));
    cropYInput.value  = val;
    cropYSlider.value = val;
    drawPreview();
  }

  cropYInput.addEventListener('input',  () => setCropY(parseInt(cropYInput.value) || 0));
  cropYSlider.addEventListener('input', () => setCropY(parseInt(cropYSlider.value) || 0));
  autoBtn.addEventListener('click', () => {
    if (!loadedImage) return;
    setCropY(Math.round((loadedImage.naturalHeight - CROP_H) / 2));
  });

  // ── 미리보기 ──────────────────────────────────
  function drawPreview() {
    if (!loadedImage) return;
    const img    = loadedImage;
    const cropY  = parseInt(cropYInput.value) || 0;
    const scale  = Math.min(1, 560 / img.naturalWidth);

    previewCvs.width  = img.naturalWidth  * scale;
    previewCvs.height = img.naturalHeight * scale;
    const ctx = previewCvs.getContext('2d');
    ctx.clearRect(0, 0, previewCvs.width, previewCvs.height);
    ctx.drawImage(img, 0, 0, previewCvs.width, previewCvs.height);

    // crop 사각형
    const rx = 0;
    const ry = cropY * scale;
    const rw = CROP_W * scale;
    const rh = CROP_H * scale;

    // 바깥 어둡게
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, previewCvs.width, ry);
    ctx.fillRect(0, ry + rh, previewCvs.width, previewCvs.height - ry - rh);

    // 테두리
    ctx.strokeStyle = '#a78bfa';
    ctx.lineWidth   = 2;
    ctx.setLineDash([]);
    ctx.strokeRect(rx, ry, rw, rh);

    // 격자 (740×640 단위)
    ctx.strokeStyle = 'rgba(167,139,250,0.4)';
    ctx.lineWidth   = 1;
    ctx.setLineDash([4, 3]);
    for (let c = 1; c < COLS; c++) {
      const x = (c * CELL_W) * scale;
      ctx.beginPath(); ctx.moveTo(x, ry); ctx.lineTo(x, ry + rh); ctx.stroke();
    }
    for (let r = 1; r < ROWS; r++) {
      const y = ry + (r * CELL_H) * scale;
      ctx.beginPath(); ctx.moveTo(rx, y); ctx.lineTo(rx + rw, y); ctx.stroke();
    }
  }

  // ── 분할 실행 ─────────────────────────────────
  runBtn.addEventListener('click', splitStickers);

  async function splitStickers() {
    if (!loadedImage || !srcCanvas) return;

    const cropY = parseInt(cropYInput.value) || 0;
    const cropX = 0;

    log('info', `▶ 분할 시작`);
    log('info', `  원본: ${loadedImage.naturalWidth} × ${loadedImage.naturalHeight} px`);
    log('info', `  crop 영역: x=${cropX}, y=${cropY}, w=${CROP_W}, h=${CROP_H}`);
    log('info', `  셀 크기: ${CELL_W} × ${CELL_H} px  (${COLS}열 × ${ROWS}행)\n`);

    runBtn.disabled = true;
    progressWrap.style.display = 'block';
    progressBar.style.width = '0%';
    resultSec.style.display = 'block';
    stickerGrid.innerHTML   = '';
    resultBlobs = [];

    const srcCtx = srcCanvas.getContext('2d');

    for (let i = 0; i < TOTAL; i++) {
      const row = Math.floor(i / COLS);
      const col = i % COLS;

      // 원본 이미지에서의 실제 픽셀 좌표
      const sx = cropX + col * CELL_W;
      const sy = cropY + row * CELL_H;

      // 셀 캔버스 (정확히 740×640)
      const cell = document.createElement('canvas');
      cell.width  = CELL_W;
      cell.height = CELL_H;
      cell.getContext('2d').drawImage(
        srcCanvas,
        sx, sy, CELL_W, CELL_H,   // 소스 영역
        0,  0,  CELL_W, CELL_H    // 대상 영역 (동일 크기 → crop only, no resize)
      );

      const w = cell.width, h = cell.height;
      const ok = (w === CELL_W && h === CELL_H);
      const fname = `sticker_${String(i + 1).padStart(2, '0')}.png`;
      log(ok ? 'ok' : 'err', `  ${fname}  ${w} × ${h} px  [${ok ? 'OK' : 'ERROR'}]`);

      const blob    = await toBlob(cell);
      const dataUrl = cell.toDataURL('image/png');
      resultBlobs.push({ fname, blob });

      // 그리드 아이템
      const div  = document.createElement('div');
      div.className = 'sticker-item';
      div.title     = fname;
      const imgEl   = document.createElement('img');
      imgEl.src     = dataUrl;
      const numEl   = document.createElement('span');
      numEl.className = 'num';
      numEl.textContent = String(i + 1).padStart(2, '0');
      div.appendChild(imgEl);
      div.appendChild(numEl);
      div.addEventListener('click', () => downloadBlob(blob, fname));
      stickerGrid.appendChild(div);

      progressBar.style.width = `${((i + 1) / TOTAL) * 100}%`;
      progressLbl.textContent  = `${i + 1} / ${TOTAL}`;
      await tick();
    }

    log('ok', `\n✓ 완료: ${TOTAL}개 파일 생성 (${CELL_W} × ${CELL_H} px)`);
    runBtn.disabled = false;
  }

  // ── ZIP 다운로드 ──────────────────────────────
  dlAllBtn.addEventListener('click', async () => {
    if (resultBlobs.length === 0) return;
    dlAllBtn.disabled = true;
    dlAllBtn.textContent = '압축 중…';
    const zip = new JSZip();
    resultBlobs.forEach(({ fname, blob }) => zip.file(fname, blob));
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    downloadBlob(zipBlob, 'stickers_ogq.zip');
    dlAllBtn.disabled = false;
    dlAllBtn.textContent = '⬇️ 전체 ZIP 다운로드 (sticker_01 ~ sticker_24)';
  });

  // ── 유틸 ──────────────────────────────────────
  function toBlob(canvas) {
    return new Promise(res => canvas.toBlob(res, 'image/png'));
  }

  function tick() {
    return new Promise(r => requestAnimationFrame(r));
  }

  function downloadBlob(blob, filename) {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }

  function log(cls, msg) {
    logEl.style.display = 'block';
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = msg + '\n';
    logEl.appendChild(span);
    logEl.scrollTop = logEl.scrollHeight;
  }
})();
</script>
</body>
</html>
